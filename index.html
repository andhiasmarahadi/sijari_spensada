<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIJARI - SMP Negeri 1 Dawan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            user-select: none;
            color: #334155;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .sidebar-item-active {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%) !important;
            color: #ffffff !important;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4) !important;
            border-left: 4px solid #a5b4fc !important;
            transform: scale(1.02);
        }
        .sidebar-item-active .icon-container { background-color: rgba(255, 255, 255, 0.2) !important; color: white !important; }

        .mobile-item-active .mobile-icon-wrap { transform: translateY(-14px); background-color: #4f46e5; border: 4px solid #f8fafc; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .mobile-item-active .mobile-label { opacity: 1; transform: translateY(8px); color: #4f46e5; font-weight: 800; }

        .action-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-btn:active { transform: scale(0.96); }
        @media (min-width: 768px) { .action-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); } }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* PRINT STYLING */
        @media screen {
            #sijari-print-area { display: none !important; }
        }
        @media print {
            body { background: white !important; margin: 0; padding: 0; }
            #app, #loader, .swal2-container, .no-print { display: none !important; }
            #sijari-print-area { display: block !important; font-family: 'Times New Roman', serif; font-size: 10pt; color: black; padding: 0; margin: 0; width: 100%; }
            @page { size: A4 portrait; margin: 1cm; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            th, td { border: 1px solid black; padding: 5px; }
            th { background-color: #dae8f5 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-weight: bold; text-align: center !important; }
            .center { text-align: center !important; }
        }
        
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
        div:where(.swal2-container) div:where(.swal2-popup) { border-radius: 24px; padding: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        input[type="text"], input[type="password"], input[type="number"], input[type="date"], select, textarea { font-size: 16px !important; }
        input:focus, select:focus, textarea:focus { box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15) !important; outline: none; border-color: #4f46e5 !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loader" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-md hidden transition-opacity duration-300">
        <div class="bg-white p-6 rounded-[2rem] shadow-2xl flex flex-col items-center gap-4 animate-bounce">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-slate-100 border-t-indigo-600"></div>
            <span class="text-[13px] font-bold text-slate-600 tracking-wider uppercase">Memproses...</span>
        </div>
    </div>

    <div id="app" class="h-[100dvh] w-full overflow-hidden">
        
        <div id="login-screen" class="h-full w-full flex items-center justify-center p-4 sm:p-6 bg-slate-900 relative overflow-hidden">
            <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-pulse"></div>
            <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-violet-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-pulse" style="animation-delay: 2s;"></div>
            
            <div class="max-w-md w-full glass-morphism p-8 md:p-10 rounded-[2.5rem] text-center relative z-10 mx-auto">
                <div class="bg-white p-3 md:p-4 rounded-[2rem] inline-block mb-6 md:mb-8 shadow-lg shadow-indigo-500/20 border border-slate-100">
                    <img src="https://i.imghippo.com/files/hDT7953HB.png" alt="Logo SIJARI" class="w-32 md:w-40 hover:scale-105 transition-transform duration-300" onerror="this.src='https://via.placeholder.com/150x50?text=SIJARI'">
                </div>
                <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 mb-2 tracking-tight">Selamat Datang</h1>
                <p class="text-xs md:text-sm text-slate-500 mb-8 font-medium">Silakan masuk menggunakan NIP Anda</p>
                <div class="space-y-4 md:space-y-5">
                    <input type="text" id="login-nip" placeholder="NIP / Username" class="w-full pl-6 pr-4 py-4 rounded-2xl border-2 border-slate-100 bg-white/50 focus:bg-white transition-all font-semibold text-slate-800 placeholder-slate-400">
                    <input type="password" id="login-pass" placeholder="Password" class="w-full pl-6 pr-4 py-4 rounded-2xl border-2 border-slate-100 bg-white/50 focus:bg-white transition-all font-semibold text-slate-800 placeholder-slate-400">
                    <button onclick="handleLogin()" class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-bold py-4 rounded-2xl transition-colors duration-300 shadow-xl shadow-slate-900/20 active:scale-[0.98] mt-4 text-[15px] tracking-wide">
                        MASUK SISTEM
                    </button>
                    <p class="text-[10px] md:text-[11px] text-slate-400 font-medium mt-8 tracking-wider uppercase leading-relaxed">
                        SIJARI v2.0 &bull; SMP Negeri 1 Dawan<br>
                        <span class="text-slate-500 font-bold">Andhi Asmara Hadi &copy; 2026</span>
                    </p>
                </div>
            </div>
        </div>

        <div id="main-layout" class="hidden h-[100dvh] flex flex-col md:flex-row bg-slate-50">
            <header class="md:hidden flex items-center justify-between px-5 py-3.5 bg-white/80 backdrop-blur-xl border-b border-slate-200/60 z-40 fixed top-0 w-full no-print">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-indigo-700 text-white flex items-center justify-center shadow-md shadow-indigo-500/20"><i class="fas fa-book-open text-sm"></i></div>
                    <div class="flex flex-col">
                        <span class="font-extrabold text-slate-800 text-[15px] tracking-tight leading-tight">SIJARI</span>
                        <span id="mobile-top-user-role" class="text-[9px] text-indigo-500 font-bold uppercase tracking-widest leading-tight">ROLE</span>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <img id="mobile-top-user-photo" src="" class="w-9 h-9 rounded-full object-cover border-[2px] border-indigo-100 shadow-sm bg-slate-100">
                    <button onclick="handleLogout()" class="w-9 h-9 flex items-center justify-center bg-rose-50 text-rose-500 rounded-xl hover:bg-rose-100 active:scale-95 transition-all"><i class="fas fa-power-off text-sm"></i></button>
                </div>
            </header>

            <aside class="hidden md:flex w-[280px] bg-[#0f172a] shadow-[4px_0_24px_rgba(0,0,0,0.1)] h-full no-print flex-col z-40 border-r border-slate-800/80">
                <div class="p-8 flex flex-col items-center border-b border-slate-800/60 relative overflow-hidden shrink-0">
                    <div class="absolute inset-0 bg-gradient-to-b from-slate-800/50 to-transparent"></div>
                    <div class="relative z-10 p-1 bg-white/10 rounded-full mb-4 backdrop-blur-sm shadow-inner">
                        <img id="user-photo-sidebar" src="" class="w-20 h-20 rounded-full object-cover border-[3px] border-slate-900 shadow-xl bg-white">
                    </div>
                    <h3 id="user-name-sidebar" class="font-bold text-white text-center relative z-10 text-[15px] tracking-wide line-clamp-1">Nama User</h3>
                    <span id="user-role-badge" class="px-4 py-1 bg-indigo-500/20 text-indigo-300 text-[10px] uppercase font-bold rounded-lg mt-2 relative z-10 border border-indigo-500/30 tracking-widest">Role</span>
                </div>
                <nav class="p-5 flex flex-col gap-2 overflow-y-auto flex-1 custom-scroll" id="desktop-nav-menu"></nav>
                <div class="p-5 border-t border-slate-800/60 shrink-0 bg-slate-900/50">
                    <button onclick="handleLogout()" class="w-full flex items-center justify-start space-x-4 p-4 text-slate-400 hover:bg-rose-50/10 hover:text-rose-400 rounded-2xl transition-all font-semibold group">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-slate-800 group-hover:bg-rose-500/20 transition-colors shadow-inner"><i class="fas fa-power-off text-[15px]"></i></div>
                        <span class="text-[14px] tracking-wide">Keluar Sistem</span>
                    </button>
                </div>
            </aside>

            <main class="flex-1 w-full h-[100dvh] overflow-y-auto overflow-x-hidden relative pt-[72px] pb-[85px] md:pt-0 md:pb-0 bg-slate-50/50">
                <div id="content-container" class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-10 w-full transition-all duration-300"></div>
            </main>

            <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-xl border-t border-slate-200/60 z-50 px-2 pt-2 pb-safe shadow-[0_-10px_40px_rgba(0,0,0,0.08)] no-print">
                <div class="flex justify-around items-end h-[60px]" id="mobile-nav-menu"></div>
            </nav>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // CONFIG FIREBASE SIJARI SPENSADA
        const IS_PREVIEW = false; 
        const APP_LOGO = "https://i.imghippo.com/files/hDT7953HB.png";
        const PRINT_KOP = "https://i.imghippo.com/files/tuTX6225pKs.png";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCMT8Jw5StNajXE6ua3UZTdGklCTFb7n34",
            authDomain: "sijari-spensada.firebaseapp.com",
            projectId: "sijari-spensada",
            storageBucket: "sijari-spensada.firebasestorage.app",
            messagingSenderId: "747386072610",
            appId: "1:747386072610:web:06e70bfaab11ce0199247b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // DATA STATE
        let currentUser = null;
        let journalsData = [];
        let usersData = [];
        let editingJournalData = null; 
        let currentFilteredJournals = [];

        const getAvatar = (nama, foto) => {
            if (foto && typeof foto === 'string' && foto.startsWith('data:image')) return foto;
            if (foto && typeof foto === 'string' && foto.trim() !== '' && !foto.includes('via.placeholder.com')) return foto.trim();
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(nama || 'User')}&background=4f46e5&color=ffffff&bold=true&rounded=true`;
        };

        const showLoader = (show) => {
            const l = document.getElementById('loader');
            if(show) { l.classList.remove('hidden'); } else { l.classList.add('hidden'); }
        };

        const notify = (title, icon = 'success') => {
            Swal.fire({
                title: `<span class="text-sm font-bold text-slate-800">${title}</span>`, 
                icon: icon, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
                customClass: { popup: '!rounded-2xl !shadow-xl !border !border-slate-100 !bg-white/95 !backdrop-blur-sm' }
            });
        };

        const compressImage = async (file, isAvatar = false) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        const maxDim = isAvatar ? 200 : 400; 
                        if (width > height) { if (width > maxDim) { height *= maxDim / width; width = maxDim; } } 
                        else { if (height > maxDim) { width *= maxDim / height; height = maxDim; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.5)); 
                    };
                };
            });
        };

        async function handleLogin() {
            const nip = document.getElementById('login-nip').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            if(!nip || !pass) return notify('Mohon isi NIP dan Password!', 'warning');
            showLoader(true);
            try {
                const adminRef = doc(db, "users", "admin");
                const adminSnap = await getDoc(adminRef);
                if (!adminSnap.exists() && nip === 'admin' && pass === 'admin2026') {
                    await setDoc(adminRef, { nip: 'admin', nama: 'Admin SIJARI', password: 'admin2026', role: 'Admin', mapel: '-', foto: '' });
                }
                const userRef = doc(db, "users", nip);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists() && String(userSnap.data().password) === String(pass)) {
                    currentUser = userSnap.data();
                    const usersQuery = await getDocs(collection(db, "users"));
                    usersData = usersQuery.docs.map(d => d.data());
                    const journalsQuery = await getDocs(collection(db, "journals"));
                    journalsData = journalsQuery.docs.map(d => d.data());
                    initApp();
                    notify('Selamat datang!');
                } else { notify('NIP atau Password salah!', 'error'); }
                showLoader(false);
            } catch (error) {
                showLoader(false);
                notify('Database Firestore belum aktif atau Rules salah.', 'error');
            }
        }

        function handleLogout() {
            Swal.fire({
                title: 'Keluar Sistem?', text: "Sesi Anda akan diakhiri.", icon: 'warning', showCancelButton: true,
                confirmButtonColor: '#4f46e5', cancelButtonColor: '#94a3b8', confirmButtonText: 'Ya, Logout',
                customClass: { confirmButton: 'rounded-xl px-6 py-3 font-bold shadow-md hover:bg-indigo-700 w-full sm:w-auto', cancelButton: 'rounded-xl px-6 py-3 font-bold hover:bg-slate-500 w-full sm:w-auto mt-2 sm:mt-0', popup: 'rounded-[2rem] p-6' }
            }).then((result) => {
                if (result.isConfirmed) {
                    currentUser = null;
                    document.getElementById('login-screen').classList.remove('hidden');
                    document.getElementById('main-layout').classList.add('hidden');
                }
            });
        }

        function initApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-layout').classList.remove('hidden');
            document.getElementById('user-photo-sidebar').src = getAvatar(currentUser.nama, currentUser.foto);
            document.getElementById('user-name-sidebar').innerText = currentUser.nama;
            document.getElementById('user-role-badge').innerText = currentUser.role;
            document.getElementById('mobile-top-user-photo').src = getAvatar(currentUser.nama, currentUser.foto);
            document.getElementById('mobile-top-user-role').innerText = currentUser.role;
            renderMenu();
            renderPage('dashboard');
        }

        function renderMenu() {
            const deskNav = document.getElementById('desktop-nav-menu');
            const mobNav = document.getElementById('mobile-nav-menu');
            let menus = [ { id: 'dashboard', label: 'Dashboard Utama', short: 'Beranda', icon: 'fa-chart-pie', action: "renderPage('dashboard')" } ];
            if (currentUser.role === 'Admin') menus.push({ id: 'manage-users', label: 'Kelola Anggota', short: 'Anggota', icon: 'fa-users-cog', action: "renderPage('manage-users')" });
            if (currentUser.role === 'Guru' || currentUser.role === 'Kepsek') menus.push({ id: 'input-jurnal', label: currentUser.role === 'Kepsek' ? 'Isi Jurnal Kepsek' : 'Isi Jurnal Baru', short: 'Isi Jurnal', icon: 'fa-pen-to-square', action: "resetAndGoToInput()" });
            menus.push({ id: 'profile', label: 'Pengaturan Profil', short: 'Profil', icon: 'fa-user-shield', action: "renderPage('profile')" });

            deskNav.innerHTML = menus.map(m => `<button onclick="${m.action}" id="btn-desktop-${m.id}" class="w-full flex items-center justify-start space-x-4 py-3.5 px-4 text-slate-400 hover:bg-slate-800/80 hover:text-slate-100 rounded-2xl transition-all duration-300 nav-btn-desktop font-semibold group relative overflow-hidden border-l-4 border-transparent"><div class="w-10 h-10 rounded-xl flex items-center justify-center bg-slate-800/80 icon-container"><i class="fas ${m.icon}"></i></div><span>${m.label}</span></button>`).join('');
            mobNav.innerHTML = menus.map(m => `<button onclick="${m.action}" id="btn-mobile-${m.id}" class="relative flex-1 h-full flex flex-col items-center justify-center nav-btn-mobile transition-all duration-300 outline-none"><div class="mobile-icon-wrap w-11 h-11 rounded-[14px] flex items-center justify-center text-slate-400 transition-all duration-300 z-10 relative"><i class="fas ${m.icon} text-[18px]"></i></div><span class="mobile-label absolute bottom-1.5 text-[10px] font-bold text-slate-400 opacity-0 transition-all duration-300 whitespace-nowrap">${m.short}</span></button>`).join('');
        }

        function renderPage(page) {
            const container = document.getElementById('content-container');
            document.querySelectorAll('.nav-btn-desktop').forEach(btn => btn.classList.remove('sidebar-item-active'));
            document.querySelectorAll('.nav-btn-mobile').forEach(btn => btn.classList.remove('mobile-item-active'));
            if(document.getElementById('btn-desktop-'+page)) document.getElementById('btn-desktop-'+page).classList.add('sidebar-item-active');
            if(document.getElementById('btn-mobile-'+page)) document.getElementById('btn-mobile-'+page).classList.add('mobile-item-active');
            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
            if (page === 'dashboard') renderDashboard(container);
            else if (page === 'input-jurnal') renderInputJurnal(container);
            else if (page === 'manage-users') renderManageUsers(container);
            else if (page === 'profile') renderProfile(container);
        }

        function renderDashboard(container, filteredData = null, filterState = {}) {
            let dataToShow = filteredData || journalsData;
            if (!filteredData && currentUser.role === 'Guru') dataToShow = journalsData.filter(j => j.nip_user === currentUser.nip);
            currentFilteredJournals = dataToShow; 
            const totalJurnal = currentFilteredJournals.length;
            let totalJam = 0, totalHadirSiswa = 0;
            currentFilteredJournals.forEach(j => {
                if(j.kelas !== 'Istirahat' && j.kelas !== 'Umum') {
                    let start = parseInt(j.jam_mulai), end = parseInt(j.jam_selesai);
                    if(!isNaN(start) && !isNaN(end) && end >= start) totalJam += (end - start + 1);
                    totalHadirSiswa += parseInt(j.jml_hadir) || 0;
                }
            });

            container.innerHTML = `
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-4">
                    <div class="w-full lg:w-auto text-center lg:text-left">
                        <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 tracking-tight">Dashboard Jurnal</h1>
                        <p class="text-[12px] md:text-sm text-slate-500 font-medium">Pantau aktivitas mengajar harian</p>
                    </div>
                    <div class="grid grid-cols-2 md:flex gap-3 w-full lg:w-auto">
                        <button onclick="handlePrintDialog()" class="action-btn bg-white border border-slate-200 text-slate-700 px-4 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 shadow-sm"><i class="fas fa-print"></i> Cetak</button>
                        <button onclick="exportToExcel()" class="action-btn bg-white border border-slate-200 text-slate-700 px-4 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 shadow-sm"><i class="fas fa-file-excel"></i> Excel</button>
                        ${currentUser.role === 'Admin' ? `<button onclick="handleBulkDelete()" class="col-span-2 md:col-span-1 action-btn bg-rose-50 border border-rose-100 text-rose-600 px-4 py-2.5 rounded-xl font-bold shadow-sm"><i class="fas fa-trash-alt"></i> Hapus Data</button>` : ''}
                    </div>
                </div>
                <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 mb-8">
                    <div class="bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-2xl p-4 md:p-6 text-white relative overflow-hidden">
                        <h3 class="text-indigo-100 text-[10px] font-bold uppercase tracking-wider mb-1">Total Entri</h3>
                        <p class="text-3xl md:text-4xl font-extrabold">${totalJurnal}</p>
                    </div>
                    <div class="bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl p-4 md:p-6 text-white relative overflow-hidden">
                        <h3 class="text-emerald-100 text-[10px] font-bold uppercase tracking-wider mb-1">Total Jam (JP)</h3>
                        <p class="text-3xl md:text-4xl font-extrabold">${totalJam}</p>
                    </div>
                    <div class="bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl p-4 md:p-6 text-white relative overflow-hidden col-span-2 lg:col-span-1">
                        <h3 class="text-orange-100 text-[11px] font-bold uppercase tracking-wider mb-1">Akumulasi Hadir</h3>
                        <p class="text-3xl md:text-4xl font-extrabold">${totalHadirSiswa}</p>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-100 mb-8">
                    <div class="grid grid-cols-1 sm:grid-cols-2 ${currentUser.role === 'Guru' ? 'lg:grid-cols-3' : 'lg:grid-cols-4'} gap-4 items-end">
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase block mb-1.5 pl-1">Dari</label><input type="date" id="filter-start" value="${filterState.start || ''}" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:bg-white bg-slate-50"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase block mb-1.5 pl-1">Sampai</label><input type="date" id="filter-end" value="${filterState.end || ''}" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:bg-white bg-slate-50"></div>
                        ${currentUser.role !== 'Guru' ? `<div><label class="text-[10px] font-bold text-slate-500 uppercase block mb-1.5 pl-1">Guru</label><input type="text" id="filter-name" value="${filterState.name || ''}" placeholder="Nama..." class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:bg-white bg-slate-50"></div>` : ''}
                        <div class="flex gap-2"><button onclick="applyFilters()" class="flex-1 bg-indigo-600 text-white py-2.5 rounded-xl font-bold active:scale-95">Terapkan</button><button onclick="resetFilters()" class="flex-1 bg-slate-100 text-slate-600 py-2.5 rounded-xl font-bold active:scale-95">Reset</button></div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col max-h-[500px]">
                    <div class="overflow-x-auto overflow-y-auto flex-1 custom-scroll relative">
                        <table class="w-full text-left border-collapse whitespace-nowrap min-w-[800px]">
                            <thead class="sticky top-0 z-20"><tr class="bg-white/90 backdrop-blur-md text-slate-500 text-[10px] uppercase tracking-wider border-b border-slate-200"><th class="p-4 font-extrabold">Waktu</th><th class="p-4 font-extrabold">Guru</th><th class="p-4 font-extrabold">Kegiatan</th><th class="p-4 font-extrabold text-center">Kelas</th><th class="p-4 font-extrabold text-center">Aksi</th></tr></thead>
                            <tbody id="journal-list-body" class="divide-y divide-slate-100">${renderJournalRows(dataToShow)}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderJournalRows(data) {
            const sorted = [...data].sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
            if(sorted.length === 0) return `<tr><td colspan="5" class="p-16 text-center text-slate-400 font-medium">Belum ada data.</td></tr>`;
            return sorted.map(j => `
                <tr class="hover:bg-slate-50/60 transition-colors">
                    <td class="p-4 align-top">
                        <div class="font-bold text-slate-800 text-[13px]">${formatDate(j.tanggal)}</div>
                        <div class="text-[10px] text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded border border-indigo-100 mt-2 inline-block font-bold">Jam: ${j.jam_mulai}-${j.jam_selesai}</div>
                    </td>
                    <td class="p-4 align-top">
                        <div class="flex items-center gap-3">
                            <img src="${getAvatar(j.nama_user, usersData.find(u => u.nip === j.nip_user)?.foto)}" class="w-9 h-9 rounded-full object-cover">
                            <span class="text-[13px] font-extrabold text-slate-700">${j.nama_user}</span>
                        </div>
                    </td>
                    <td class="p-4 align-top"><p class="max-w-[300px] whitespace-normal text-[13px] text-slate-600 leading-relaxed line-clamp-2">${j.uraian}</p></td>
                    <td class="p-4 align-top text-center"><span class="px-2 py-1 rounded-lg bg-slate-100 text-slate-700 text-[10px] font-bold uppercase">${j.kelas || '-'}</span></td>
                    <td class="p-4 align-top text-center">
                        <div class="flex justify-center gap-2">
                            ${(currentUser.role === 'Admin' || currentUser.nip === j.nip_user) ? `<button onclick="editJournalEntry('${j.id}')" class="bg-white border border-slate-200 text-slate-500 w-8 h-8 rounded-xl flex items-center justify-center active:scale-90"><i class="fas fa-pen text-[12px]"></i></button><button onclick="deleteIndividualJournal('${j.id}')" class="bg-white border border-slate-200 text-rose-500 w-8 h-8 rounded-xl flex items-center justify-center active:scale-90"><i class="fas fa-trash text-[12px]"></i></button>` : '-'}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function formatDate(d) {
            if (!d) return '-';
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            const parts = d.split('-');
            if (parts.length === 3) return new Date(parts[0], parseInt(parts[1]) - 1, parts[2]).toLocaleDateString('id-ID', options);
            return new Date(d).toLocaleDateString('id-ID', options);
        }

        function printReport(dataToPrint, filterNipGuru = null) {
            if (!dataToPrint || dataToPrint.length === 0) return notify('Tidak ada data.', 'warning');
            const kepsek = { nama: 'Ni Kadek Yadnyani, S.Pd', nip: '197910162006042006' };
            let gName = currentUser.nama, gNip = currentUser.nip, isK = (currentUser.role === 'Kepsek');
            if (filterNipGuru) {
                const u = usersData.find(x => x.nip === filterNipGuru);
                if (u) { gName = u.nama; gNip = u.nip; if (u.role === 'Kepsek') isK = true; }
            }
            const sorted = [...dataToPrint].sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));
            let tableRows = sorted.map((j, i) => `<tr><td class="center">${i+1}</td><td>${formatDate(j.tanggal)}</td><td class="center">${j.jam_mulai}-${j.jam_selesai}</td><td>${j.uraian}</td><td class="center">${j.foto ? 'Ada' : '-'}</td></tr>`).join('');
            
            const html = `
                <div id="sijari-print-area">
                    <div style="text-align: center; margin-bottom: 20px;"><img src="${PRINT_KOP}" style="width: 100%;"></div>
                    <h2 style="text-align: center; font-weight: bold; text-transform: uppercase;">JURNAL KEGIATAN BELAJAR MENGAJAR</h2>
                    <table class="data">
                        <thead><tr><th>No</th><th>Hari/Tanggal</th><th>Jam Ke</th><th>Uraian Kegiatan</th><th>Dok.</th></tr></thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                    <div style="margin-top: 40px; display: flex; justify-content: space-between;">
                        <div style="text-align: center; width: 45%;">Mengetahui,<br>Kepala Sekolah<br><br><br><br><b>${kepsek.nama}</b><br>NIP. ${kepsek.nip}</div>
                        <div style="text-align: center; width: 45%;">Dawan, ${new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}<br>Guru Pengajar<br><br><br><br><b>${gName}</b><br>NIP. ${gNip}</div>
                    </div>
                </div>
            `;
            let pArea = document.getElementById('sijari-print-area');
            if(pArea) pArea.remove();
            document.body.insertAdjacentHTML('beforeend', html);
            showLoader(true);
            setTimeout(() => { showLoader(false); window.print(); }, 800);
        }

        async function submitJurnal() {
            const form = document.getElementById('journal-form');
            if(!form.checkValidity()) return notify('Lengkapi data!', 'warning');
            showLoader(true);
            const data = {
                id: editingJournalData ? editingJournalData.id : Date.now().toString(),
                tanggal: document.getElementById('f-tgl').value,
                kelas: document.getElementById('f-kelas').value,
                jam_mulai: document.getElementById('f-jam-mulai').value,
                jam_selesai: document.getElementById('f-jam-selesai').value,
                uraian: document.getElementById('f-uraian').value,
                nip_user: editingJournalData ? editingJournalData.nip_user : currentUser.nip,
                nama_user: editingJournalData ? editingJournalData.nama_user : currentUser.nama,
                jml_hadir: document.getElementById('f-hadir')?.value || 0,
                abs_sakit: document.getElementById('f-sakit')?.value || 0,
                abs_ijin: document.getElementById('f-ijin')?.value || 0,
                abs_alpha: document.getElementById('f-alpha')?.value || 0,
                foto: document.getElementById('f-foto-img')?.src || ''
            };
            try {
                await setDoc(doc(db, "journals", data.id), data);
                const journalsQuery = await getDocs(collection(db, "journals"));
                journalsData = journalsQuery.docs.map(d => d.data());
                showLoader(false);
                notify('Berhasil disimpan!');
                editingJournalData = null;
                renderPage('dashboard');
            } catch(e) { showLoader(false); notify(e.message, 'error'); }
        }

        function renderManageUsers(container) {
            container.innerHTML = `
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-4">
                    <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800">Kelola Anggota</h1>
                    <div class="grid grid-cols-2 md:flex gap-3 w-full lg:w-auto">
                        <button onclick="downloadUserTemplate()" class="action-btn bg-white border border-slate-200 text-emerald-600 px-4 py-2.5 rounded-xl font-bold">Template</button>
                        <button onclick="document.getElementById('excel-upload').click()" class="action-btn bg-white border border-slate-200 text-indigo-600 px-4 py-2.5 rounded-xl font-bold">Upload</button>
                        <input type="file" id="excel-upload" class="hidden" accept=".xlsx, .xls" onchange="handleExcelUpload(this)">
                        <button onclick="showUserForm()" class="action-btn bg-indigo-600 text-white px-4 py-2.5 rounded-xl font-bold">Tambah</button>
                        <button onclick="handleDeleteAllUsers()" class="action-btn bg-rose-50 text-rose-600 px-4 py-2.5 rounded-xl font-bold">Bersihkan</button>
                    </div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden max-h-[550px] overflow-y-auto">
                    <table class="w-full text-left whitespace-nowrap min-w-[700px]">
                        <thead class="sticky top-0 bg-white/95 backdrop-blur-md z-10 border-b border-slate-200"><tr class="text-slate-500 text-[10px] uppercase font-bold"><th class="p-5">Profil</th><th class="p-5">NIP</th><th class="p-5">Mapel</th><th class="p-5">Role</th><th class="p-5 text-right">Aksi</th></tr></thead>
                        <tbody class="divide-y divide-slate-50">
                            ${usersData.map(u => `<tr><td class="p-5 flex items-center gap-4"><img src="${getAvatar(u.nama, u.foto)}" class="w-10 h-10 rounded-full object-cover bg-white"><span class="font-bold text-slate-800">${u.nama}</span></td><td class="p-5 font-mono text-sm">${u.nip}</td><td class="p-5 text-sm">${u.mapel || '-'}</td><td class="p-5"><span class="px-2 py-1 rounded bg-indigo-50 text-indigo-700 text-[10px] font-bold">${u.role}</span></td><td class="p-5 text-right"><div class="flex justify-end gap-2"><button onclick="showUserForm('${u.nip}')" class="bg-white border border-slate-200 w-8 h-8 rounded-xl flex items-center justify-center"><i class="fas fa-pen text-[12px]"></i></button><button onclick="deleteUser('${u.nip}')" class="bg-white border border-slate-200 text-rose-500 w-8 h-8 rounded-xl flex items-center justify-center"><i class="fas fa-trash text-[12px]"></i></button></div></td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function showUserForm(nip = null) {
            const user = nip ? usersData.find(u => u.nip === nip) : { nip: '', nama: '', password: '', role: 'Guru', mapel: '', foto: '' };
            const { value: v } = await Swal.fire({
                title: 'User Form',
                html: `<input id="sw-nip" class="swal2-input" placeholder="NIP" value="${user.nip}" ${nip?'disabled':''}>
                       <input id="sw-nama" class="swal2-input" placeholder="Nama" value="${user.nama}">
                       <input id="sw-mapel" class="swal2-input" placeholder="Mapel" value="${user.mapel}">
                       <input id="sw-pass" type="password" class="swal2-input" placeholder="Password" value="${user.password}">
                       <select id="sw-role" class="swal2-input"><option value="Guru" ${user.role==='Guru'?'selected':''}>Guru</option><option value="Kepsek" ${user.role==='Kepsek'?'selected':''}>Kepsek</option><option value="Admin" ${user.role==='Admin'?'selected':''}>Admin</option></select>`,
                preConfirm: () => ({ nip: document.getElementById('sw-nip').value, nama: document.getElementById('sw-nama').value, mapel: document.getElementById('sw-mapel').value, password: document.getElementById('sw-pass').value, role: document.getElementById('sw-role').value, foto: user.foto })
            });
            if(v) {
                showLoader(true);
                try {
                    await setDoc(doc(db, "users", v.nip), v);
                    const usersQuery = await getDocs(collection(db, "users"));
                    usersData = usersQuery.docs.map(d => d.data());
                    if (currentUser && currentUser.nip === v.nip) { currentUser = v; initApp(); }
                    renderPage('manage-users'); showLoader(false); notify('Disimpan!');
                } catch(e) { showLoader(false); notify(e.message, 'error'); }
            }
        }

        function renderProfile(container) {
            container.innerHTML = `
                <div class="max-w-md mx-auto bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 text-center relative overflow-hidden mt-6">
                    <div class="absolute top-0 left-0 w-full h-32 bg-slate-800"></div>
                    <div class="relative z-10 pt-12 mb-6 inline-block">
                        <img id="p-foto-preview" src="${getAvatar(currentUser.nama, currentUser.foto)}" class="w-32 h-32 rounded-[2rem] object-cover border-[4px] border-white shadow-xl bg-white">
                        <label class="absolute -bottom-2 -right-2 bg-indigo-600 text-white w-10 h-10 flex items-center justify-center rounded-xl cursor-pointer border-2 border-white"><i class="fas fa-camera"></i><input type="file" class="hidden" onchange="previewProfilePhoto(this)"></label>
                    </div>
                    <h2 class="text-2xl font-extrabold text-slate-800 mb-8">${currentUser.nama}</h2>
                    <div class="space-y-4 text-left">
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">NIP</label><input type="text" value="${currentUser.nip}" disabled class="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-xl"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Nama</label><input type="text" id="p-nama" value="${currentUser.nama}" class="w-full p-3.5 border border-slate-200 rounded-xl font-bold"></div>
                        ${currentUser.role==='Guru'?`<div><label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Mapel</label><input type="text" id="p-mapel" value="${currentUser.mapel}" class="w-full p-3.5 border border-slate-200 rounded-xl font-bold"></div>`:''}
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Password</label><input type="password" id="p-pass" value="${currentUser.password}" class="w-full p-3.5 border border-slate-200 rounded-xl font-bold"></div>
                        <button onclick="updateProfile()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl mt-4 active:scale-[0.98]">SIMPAN PERUBAHAN</button>
                    </div>
                </div>
            `;
        }

        async function previewProfilePhoto(input) {
            if (input.files && input.files[0]) {
                const base64 = await compressImage(input.files[0], true); 
                document.getElementById('p-foto-preview').src = base64;
                notify('Foto siap! Klik Simpan', 'info');
            }
        }

        async function updateProfile() {
            showLoader(true);
            const newData = { ...currentUser, nama: document.getElementById('p-nama').value, password: document.getElementById('p-pass').value, foto: document.getElementById('p-foto-preview').src };
            if(document.getElementById('p-mapel')) newData.mapel = document.getElementById('p-mapel').value;
            try {
                await setDoc(doc(db, "users", newData.nip), newData);
                currentUser = newData; initApp(); showLoader(false); notify('Profil diperbarui!');
            } catch(e) { showLoader(false); notify(e.message, 'error'); }
        }

        // BINDING
        window.handleLogin = handleLogin; window.handleLogout = handleLogout; window.renderPage = renderPage;
        window.resetAndGoToInput = () => { editingJournalData = null; renderPage('input-jurnal'); };
        window.applyFilters = applyFilters; window.resetFilters = resetFilters; window.exportToExcel = exportToExcel;
        window.editJournalEntry = (id) => { editingJournalData = journalsData.find(j=>j.id===id); renderPage('input-jurnal'); };
        window.deleteIndividualJournal = deleteIndividualJournal;
        window.submitJurnal = submitJurnal; window.handlePrintDialog = handlePrintDialog;
        window.showUserForm = showUserForm; window.previewProfilePhoto = previewProfilePhoto; window.updateProfile = updateProfile;
        window.handleBulkDelete = handleBulkDelete; window.downloadUserTemplate = downloadUserTemplate;
        window.handleExcelUpload = handleExcelUpload; window.deleteUser = deleteUser; window.handleDeleteAllUsers = handleDeleteAllUsers;

    </script>
</body>
</html>
