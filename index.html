<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIJARI - SMP Negeri 1 Dawan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- SheetJS for Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            user-select: none;
            color: #334155;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .sidebar-item-active {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%) !important;
            color: #ffffff !important;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4) !important;
            border-left: 4px solid #a5b4fc !important;
            transform: scale(1.02);
        }
        .sidebar-item-active .icon-container { background-color: rgba(255, 255, 255, 0.2) !important; color: white !important; }

        .mobile-item-active .mobile-icon-wrap { transform: translateY(-14px); background-color: #4f46e5; border: 4px solid #f8fafc; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .mobile-item-active .mobile-label { opacity: 1; transform: translateY(8px); color: #4f46e5; font-weight: 800; }

        .action-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-btn:active { transform: scale(0.96); }
        @media (min-width: 768px) { .action-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); } }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .print-area { width: 100%; margin: 0; padding: 0; }
        }
        
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
        div:where(.swal2-container) div:where(.swal2-popup) { border-radius: 24px; padding: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        input[type="text"], input[type="password"], input[type="number"], input[type="date"], select, textarea { font-size: 16px !important; }
        input:focus, select:focus, textarea:focus { box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15) !important; outline: none; border-color: #4f46e5 !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- LOADING SPINNER -->
    <div id="loader" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-md hidden transition-opacity duration-300">
        <div class="bg-white p-6 rounded-[2rem] shadow-2xl flex flex-col items-center gap-4 animate-bounce">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-slate-100 border-t-indigo-600"></div>
            <span class="text-[13px] font-bold text-slate-600 tracking-wider uppercase">Memproses...</span>
        </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div id="app" class="h-[100dvh] w-full overflow-hidden">
        
        <!-- LOGIN SCREEN -->
        <div id="login-screen" class="h-full w-full flex items-center justify-center p-4 sm:p-6 bg-slate-900 relative overflow-hidden">
            <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-pulse"></div>
            <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-violet-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-pulse" style="animation-delay: 2s;"></div>
            
            <div class="max-w-md w-full glass-morphism p-8 md:p-10 rounded-[2.5rem] text-center relative z-10 mx-auto">
                <div class="bg-white p-3 md:p-4 rounded-[2rem] inline-block mb-6 md:mb-8 shadow-lg shadow-indigo-500/20 border border-slate-100">
                    <img src="https://i.imghippo.com/files/hDT7953HB.png" alt="Logo SIJARI" class="w-32 md:w-40 hover:scale-105 transition-transform duration-300" onerror="this.src='https://via.placeholder.com/150x50?text=SIJARI'">
                </div>
                
                <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 mb-2 tracking-tight">Selamat Datang</h1>
                <p class="text-xs md:text-sm text-slate-500 mb-8 font-medium">Silakan masuk menggunakan NIP Anda</p>

                <div class="space-y-4 md:space-y-5">
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400 group-focus-within:text-indigo-600 transition-colors">
                            <i class="fas fa-user text-lg"></i>
                        </span>
                        <input type="text" id="login-nip" placeholder="NIP / Username" class="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-slate-100 bg-white/50 focus:bg-white transition-all font-semibold text-slate-800 placeholder-slate-400">
                    </div>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400 group-focus-within:text-indigo-600 transition-colors">
                            <i class="fas fa-lock text-lg"></i>
                        </span>
                        <input type="password" id="login-pass" placeholder="Password" class="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-slate-100 bg-white/50 focus:bg-white transition-all font-semibold text-slate-800 placeholder-slate-400">
                    </div>
                    <button onclick="handleLogin()" class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-bold py-4 rounded-2xl transition-colors duration-300 shadow-xl shadow-slate-900/20 active:scale-[0.98] mt-4 text-[15px] tracking-wide">
                        MASUK SISTEM
                    </button>
                    <p class="text-[10px] md:text-[11px] text-slate-400 font-medium mt-8 tracking-wider uppercase leading-relaxed">
                        SIJARI v2.0 &bull; SMP Negeri 1 Dawan<br>
                        <span class="text-slate-500 font-bold">Andhi Asmara Hadi &copy; 2026</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- MAIN LAYOUT -->
        <div id="main-layout" class="hidden h-[100dvh] flex flex-col md:flex-row bg-slate-50">
            
            <!-- 1. MOBILE TOP HEADER (STICKY) -->
            <header class="md:hidden flex items-center justify-between px-5 py-3.5 bg-white/80 backdrop-blur-xl border-b border-slate-200/60 z-40 fixed top-0 w-full no-print">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-indigo-700 text-white flex items-center justify-center shadow-md shadow-indigo-500/20">
                        <i class="fas fa-book-open text-sm"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="font-extrabold text-slate-800 text-[15px] tracking-tight leading-tight">SIJARI</span>
                        <span id="mobile-top-user-role" class="text-[9px] text-indigo-500 font-bold uppercase tracking-widest leading-tight">ROLE</span>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <img id="mobile-top-user-photo" src="" class="w-9 h-9 rounded-full object-cover border-[2px] border-indigo-100 shadow-sm bg-slate-100">
                    <button onclick="handleLogout()" class="w-9 h-9 flex items-center justify-center bg-rose-50 text-rose-500 rounded-xl hover:bg-rose-100 active:scale-95 transition-all">
                        <i class="fas fa-power-off text-sm"></i>
                    </button>
                </div>
            </header>

            <!-- 2. DESKTOP SIDEBAR -->
            <aside class="hidden md:flex w-[280px] bg-[#0f172a] shadow-[4px_0_24px_rgba(0,0,0,0.1)] h-full no-print flex-col z-40 border-r border-slate-800/80">
                <div class="p-8 flex flex-col items-center border-b border-slate-800/60 relative overflow-hidden shrink-0">
                    <div class="absolute inset-0 bg-gradient-to-b from-slate-800/50 to-transparent"></div>
                    <div class="relative z-10 p-1 bg-white/10 rounded-full mb-4 backdrop-blur-sm shadow-inner">
                        <img id="user-photo-sidebar" src="" class="w-20 h-20 rounded-full object-cover border-[3px] border-slate-900 shadow-xl bg-white">
                    </div>
                    <h3 id="user-name-sidebar" class="font-bold text-white text-center relative z-10 text-[15px] tracking-wide line-clamp-1">Nama User</h3>
                    <span id="user-role-badge" class="px-4 py-1 bg-indigo-500/20 text-indigo-300 text-[10px] uppercase font-bold rounded-lg mt-2 relative z-10 border border-indigo-500/30 tracking-widest">Role</span>
                </div>
                
                <nav class="p-5 flex flex-col gap-2 overflow-y-auto flex-1 custom-scroll" id="desktop-nav-menu"></nav>

                <div class="p-5 border-t border-slate-800/60 shrink-0 bg-slate-900/50">
                    <button onclick="handleLogout()" class="w-full flex items-center justify-start space-x-4 p-4 text-slate-400 hover:bg-rose-500/10 hover:text-rose-400 rounded-2xl transition-all font-semibold group">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-slate-800 group-hover:bg-rose-500/20 transition-colors shadow-inner">
                            <i class="fas fa-power-off text-[15px]"></i>
                        </div>
                        <span class="text-[14px] tracking-wide">Keluar Sistem</span>
                    </button>
                </div>
            </aside>

            <!-- 3. MAIN CONTENT AREA -->
            <main class="flex-1 w-full h-[100dvh] overflow-y-auto overflow-x-hidden relative pt-[72px] pb-[85px] md:pt-0 md:pb-0 bg-slate-50/50">
                <div id="content-container" class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-10 w-full transition-all duration-300"></div>
            </main>

            <!-- 4. MOBILE BOTTOM NAV (APP-LIKE) -->
            <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-xl border-t border-slate-200/60 z-50 px-2 pt-2 pb-safe shadow-[0_-10px_40px_rgba(0,0,0,0.08)] no-print">
                <div class="flex justify-around items-end h-[60px]" id="mobile-nav-menu"></div>
            </nav>
        </div>
    </div>

    <!-- FIREBASE & SCRIPT LOGIC (MODULE) -->
    <script type="module">
        // --- 1. FIREBASE IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // =========================================================================
        // KONFIGURASI FIREBASE APLIKASI
        // =========================================================================
        const IS_PREVIEW = false; // GANTI JADI false JIKA FIREBASE SUDAH DISIAPKAN BAWAH INI
        
          const firebaseConfig = {
    apiKey: "AIzaSyCMT8Jw5StNajXE6ua3UZTdGklCTFb7n34",
    authDomain: "sijari-spensada.firebaseapp.com",
    projectId: "sijari-spensada",
    storageBucket: "sijari-spensada.firebasestorage.app",
    messagingSenderId: "747386072610",
    appId: "1:747386072610:web:06e70bfaab11ce0199247b"
  };
        // =========================================================================

        let db;
        if (!IS_PREVIEW) {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
            } catch(e) {
                console.error("Firebase Initialization Error:", e);
            }
        }

        // --- DATA STATE ---
        let currentUser = null;
        let journalsData = [];
        let usersData = [];
        let activePage = 'dashboard';
        let currentFilteredJournals = []; 
        let editingJournalData = null; 

        const getAvatar = (nama, foto) => {
            if (foto && typeof foto === 'string' && foto.startsWith('data:image')) return foto;
            if (foto && typeof foto === 'string' && foto.trim() !== '' && !foto.includes('via.placeholder.com') && !foto.includes('ui-avatars.com')) return foto.trim();
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(nama || 'User')}&background=4f46e5&color=ffffff&bold=true&rounded=true`;
        };

        const dummyUsers = [
            { nip: 'admin', nama: 'Admin SIJARI', password: 'edudigital', role: 'Admin', foto: '', mapel: '-' },
            { nip: 'kepsek', nama: 'Kepala Sekolah, M.Pd', password: 'edudigital', role: 'Kepsek', foto: '', mapel: '-' },
            { nip: 'peserta', nama: 'Guru Aktif, S.Pd', password: 'edudigital', role: 'Guru', foto: '', mapel: 'Matematika' }
        ];

        const dummyJournals = [
            { id: '1001', tanggal: '2026-05-06', nip_user: 'peserta', nama_user: 'Guru Aktif, S.Pd', jam_mulai: '1', jam_selesai: '3', kelas: '7A', uraian: 'Mempelajari Aljabar Dasar', jml_hadir: 30, abs_sakit: 1, abs_ijin: 0, abs_alpha: 0, foto: '' },
            { id: '1002', tanggal: '2026-05-06', nip_user: 'peserta', nama_user: 'Guru Aktif, S.Pd', jam_mulai: '4', jam_selesai: '5', kelas: '8B', uraian: 'Persamaan Linear', jml_hadir: 28, abs_sakit: 0, abs_ijin: 2, abs_alpha: 0, foto: '' }
        ];

        if(IS_PREVIEW) {
            usersData = [...dummyUsers];
            journalsData = [...dummyJournals];
        }

        const showLoader = (show) => {
            const l = document.getElementById('loader');
            if(show) { l.classList.remove('hidden'); setTimeout(() => l.classList.remove('opacity-0'), 10); } 
            else { l.classList.add('opacity-0'); setTimeout(() => l.classList.add('hidden'), 300); }
        };

        const notify = (title, icon = 'success') => {
            Swal.fire({
                title: `<span class="text-sm font-bold text-slate-800">${title}</span>`, 
                icon: icon, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
                customClass: { popup: '!rounded-2xl !shadow-xl !border !border-slate-100 !bg-white/95 !backdrop-blur-sm' }
            });
        };

        const compressImage = async (file, isAvatar = false) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        const maxDim = isAvatar ? 200 : 400; 
                        if (width > height) { if (width > maxDim) { height *= maxDim / width; width = maxDim; } } 
                        else { if (height > maxDim) { width *= maxDim / height; height = maxDim; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.5)); 
                    };
                };
            });
        };

        async function handleLogin() {
            const nip = document.getElementById('login-nip').value.trim();
            const pass = document.getElementById('login-pass').value.trim();

            if(!nip || !pass) return notify('Mohon isi NIP dan Password!', 'warning');

            showLoader(true);

            if (IS_PREVIEW) {
                setTimeout(() => {
                    const user = usersData.find(u => String(u.nip) === String(nip) && String(u.password) === String(pass));
                    if (user) { currentUser = user; initApp(); notify('Selamat datang!'); } 
                    else { notify('NIP atau Password salah!', 'error'); }
                    showLoader(false);
                }, 1000);
            } else {
                try {
                    // SETUP ADMIN OTOMATIS SAAT PERTAMA KALI JALAN
                    const adminRef = doc(db, "users", "admin");
                    const adminSnap = await getDoc(adminRef);
                    if (!adminSnap.exists() && nip === 'admin' && pass === 'admin2026') {
                        await setDoc(adminRef, { nip: 'admin', nama: 'Admin SIJARI', password: 'admin2026', role: 'Admin', mapel: '-', foto: '' });
                    }

                    // PROSES LOGIN
                    const userRef = doc(db, "users", nip);
                    const userSnap = await getDoc(userRef);

                    if (userSnap.exists() && String(userSnap.data().password) === String(pass)) {
                        currentUser = userSnap.data();
                        
                        // LOAD DATA Users
                        const usersQuery = await getDocs(collection(db, "users"));
                        usersData = usersQuery.docs.map(d => d.data());

                        // LOAD DATA Journals
                        const journalsQuery = await getDocs(collection(db, "journals"));
                        journalsData = journalsQuery.docs.map(d => d.data());

                        initApp();
                        notify('Selamat datang!');
                    } else {
                        notify('NIP atau Password salah!', 'error');
                    }
                    showLoader(false);
                } catch (error) {
                    showLoader(false);
                    notify('Error Koneksi Firebase: ' + error.message, 'error');
                }
            }
        }

        function handleLogout() {
            Swal.fire({
                title: 'Keluar Sistem?', text: "Sesi Anda akan diakhiri.", icon: 'warning', showCancelButton: true,
                confirmButtonColor: '#4f46e5', cancelButtonColor: '#94a3b8', confirmButtonText: 'Ya, Logout', cancelButtonText: 'Batal',
                customClass: { confirmButton: 'rounded-xl px-6 py-3 font-bold shadow-md hover:bg-indigo-700 w-full sm:w-auto', cancelButton: 'rounded-xl px-6 py-3 font-bold hover:bg-slate-500 w-full sm:w-auto mt-2 sm:mt-0', popup: 'rounded-[2rem] p-6', actions: 'flex-col sm:flex-row w-full' }
            }).then((result) => {
                if (result.isConfirmed) {
                    currentUser = null;
                    document.getElementById('login-screen').classList.remove('hidden');
                    document.getElementById('main-layout').classList.add('hidden');
                    document.getElementById('login-nip').value = '';
                    document.getElementById('login-pass').value = '';
                }
            });
        }

        function initApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-layout').classList.remove('hidden');
            
            document.getElementById('user-photo-sidebar').src = getAvatar(currentUser.nama, currentUser.foto);
            document.getElementById('user-name-sidebar').innerText = currentUser.nama;
            document.getElementById('user-role-badge').innerText = currentUser.role;

            document.getElementById('mobile-top-user-photo').src = getAvatar(currentUser.nama, currentUser.foto);
            document.getElementById('mobile-top-user-role').innerText = currentUser.role;

            renderMenu();
            renderPage('dashboard');
        }

        function resetAndGoToInput() { editingJournalData = null; renderPage('input-jurnal'); }

        function renderMenu() {
            const deskNav = document.getElementById('desktop-nav-menu');
            const mobNav = document.getElementById('mobile-nav-menu');
            
            let menus = [ { id: 'dashboard', label: 'Dashboard Utama', short: 'Beranda', icon: 'fa-chart-pie', action: "renderPage('dashboard')" } ];

            if (currentUser.role === 'Admin') {
                menus.push({ id: 'manage-users', label: 'Kelola Anggota', short: 'Anggota', icon: 'fa-users-cog', action: "renderPage('manage-users')" });
            }
            if (currentUser.role === 'Guru' || currentUser.role === 'Kepsek') {
                menus.push({ id: 'input-jurnal', label: currentUser.role === 'Kepsek' ? 'Isi Jurnal Kepsek' : 'Isi Jurnal Baru', short: 'Isi Jurnal', icon: 'fa-pen-to-square', action: "resetAndGoToInput()" });
            }
            menus.push({ id: 'profile', label: 'Pengaturan Profil', short: 'Profil', icon: 'fa-user-shield', action: "renderPage('profile')" });

            deskNav.innerHTML = menus.map(m => `
                <button onclick="${m.action}" id="btn-desktop-${m.id}" title="${m.label}" class="w-full flex items-center justify-start space-x-4 py-3.5 px-4 text-slate-400 hover:bg-slate-800/80 hover:text-slate-100 rounded-2xl transition-all duration-300 nav-btn-desktop font-semibold group relative overflow-hidden border-l-4 border-transparent">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-slate-800/80 text-current icon-container transition-all duration-300 group-hover:scale-110 group-hover:text-indigo-400 group-hover:bg-slate-700 shadow-inner">
                        <i class="fas ${m.icon} text-[16px]"></i>
                    </div>
                    <span class="text-[14px] tracking-wide">${m.label}</span>
                </button>
            `).join('');

            mobNav.innerHTML = menus.map(m => `
                <button onclick="${m.action}" id="btn-mobile-${m.id}" class="relative flex-1 h-full flex flex-col items-center justify-center group nav-btn-mobile transition-all duration-300 outline-none">
                    <div class="mobile-icon-wrap w-11 h-11 rounded-[14px] flex items-center justify-center text-slate-400 bg-transparent transition-all duration-300 z-10 relative">
                        <i class="fas ${m.icon} text-[18px]"></i>
                    </div>
                    <span class="mobile-label absolute bottom-1.5 text-[10px] font-bold text-slate-400 opacity-0 transform translate-y-2 transition-all duration-300 whitespace-nowrap">${m.short}</span>
                </button>
            `).join('');
        }

        function renderPage(page) {
            activePage = page;
            const container = document.getElementById('content-container');
            
            document.querySelectorAll('.nav-btn-desktop').forEach(btn => btn.classList.remove('sidebar-item-active'));
            document.querySelectorAll('.nav-btn-mobile').forEach(btn => btn.classList.remove('mobile-item-active'));
            
            const activeDesktop = document.getElementById('btn-desktop-' + page);
            if(activeDesktop) activeDesktop.classList.add('sidebar-item-active');

            const activeMobile = document.getElementById('btn-mobile-' + page);
            if(activeMobile) activeMobile.classList.add('mobile-item-active');

            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });

            container.style.opacity = 0;
            container.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                if (page === 'dashboard') renderDashboard(container);
                else if (page === 'input-jurnal') renderInputJurnal(container);
                else if (page === 'manage-users') renderManageUsers(container);
                else if (page === 'profile') renderProfile(container);

                container.style.transition = 'all 0.3s ease';
                container.style.opacity = 1;
                container.style.transform = 'translateY(0)';
            }, 50);
        }

        function renderDashboard(container, filteredData = null, filterState = {}) {
            let dataToShow = filteredData || journalsData;
            if (!filteredData && currentUser.role === 'Guru') dataToShow = journalsData.filter(j => j.nip_user === currentUser.nip);
            currentFilteredJournals = dataToShow; 

            const totalJurnal = currentFilteredJournals.length;
            let totalJam = 0, totalHadirSiswa = 0;
            currentFilteredJournals.forEach(j => {
                if(j.kelas !== 'Istirahat' && j.kelas !== 'Umum') {
                    let start = parseInt(j.jam_mulai), end = parseInt(j.jam_selesai);
                    if(!isNaN(start) && !isNaN(end) && end >= start) totalJam += (end - start + 1);
                    totalHadirSiswa += parseInt(j.jml_hadir) || 0;
                }
            });

            container.innerHTML = `
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 md:mb-8 gap-4 md:gap-5">

        function renderJournalRows(data) {
            const sorted = [...data].sort((a, b) => {
                const dateA = new Date(a.tanggal);
                const dateB = new Date(b.tanggal);
                if (dateA > dateB) return -1;
                if (dateA < dateB) return 1;
                return (parseInt(b.jam_mulai) || 0) - (parseInt(a.jam_mulai) || 0);
            });
            if(sorted.length === 0) return `<tr><td colspan="6" class="p-16 text-center text-slate-400 font-medium"><div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-100"><i class="fas fa-folder-open text-2xl text-slate-300"></i></div>Belum ada data jurnal ditemukan.</td></tr>`;
            
            return sorted.map(j => `
                <tr class="hover:bg-slate-50/60 transition-colors group">
                    <td class="p-4 md:p-5 align-top">
                        <div class="font-bold text-slate-800 text-[13px] md:text-sm">${formatDate(j.tanggal)}</div>
                        <div class="text-[10px] md:text-[11px] text-indigo-600 bg-indigo-50 inline-flex items-center px-2 py-0.5 rounded border border-indigo-100 mt-2 font-bold">

                        </div>
                    </td>
                    <td class="p-4 md:p-5 align-top">
                        <div class="flex items-center gap-3">
                            <img src="${getAvatar(j.nama_user, usersData.find(u => u.nip === j.nip_user)?.foto)}" class="w-9 h-9 md:w-10 md:h-10 rounded-full border border-slate-200 shadow-sm object-cover bg-white">
                            <div>
                                <span class="block text-[13px] md:text-sm font-extrabold text-slate-700">${j.nama_user}</span>
                                <span class="block text-[10px] md:text-[11px] text-slate-400 font-bold mt-0.5">${j.nip_user}</span>
                            </div>
                        </div>
                    </td>
                    <td class="p-4 md:p-5 align-top">
                        <p class="max-w-[250px] md:max-w-[300px] whitespace-normal text-[13px] md:text-sm text-slate-600 leading-relaxed line-clamp-2 font-medium" title="${j.uraian}">${j.uraian}</p>
                    </td>
                    <td class="p-4 md:p-5 align-top text-center">
                        <span class="px-3 py-1.5 rounded-lg bg-slate-100 text-slate-700 text-[10px] md:text-[11px] font-bold uppercase tracking-widest inline-block border border-slate-200/60">${j.kelas || '-'}</span>
                    </td>
                    <td class="p-4 md:p-5 align-top text-center">
                        ${j.foto ? `
                            <div class="relative inline-block group/img">
                                <img src="${j.foto}" class="w-10 h-10 md:w-12 md:h-12 rounded-xl object-cover cursor-pointer transition-all duration-300 border border-slate-200 shadow-sm group-hover/img:shadow-md group-hover/img:border-indigo-300 bg-white p-0.5" onclick="previewImage('${j.foto}')">
                            </div>
                        ` : '<span class="text-slate-400 italic text-[10px] md:text-xs font-bold bg-slate-50 px-2 py-1.5 rounded-lg border border-slate-100">Kosong</span>'}
                    </td>
                    <td class="p-4 md:p-5 align-top text-center">
                        <div class="flex justify-center gap-2">

                            <button onclick="editJournalEntry('${j.id}')" class="bg-white border border-slate-200 text-slate-500 hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-200 w-8 h-8 md:w-9 md:h-9 rounded-xl flex items-center justify-center transition-all shadow-sm active:scale-90">
                                <i class="fas fa-pen text-[12px] md:text-[13px]"></i>
                            </button>

                                <i class="fas fa-trash text-[12px] md:text-[13px]"></i>
                            </button>
                            ` : '<span class="text-slate-300 text-xs">-</span>'}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function formatDate(d) {
            if (!d) return '-';
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            if (typeof d === 'string' && d.includes('-') && !d.includes('T')) {
                const parts = d.split('-');
                if (parts.length === 3) return new Date(parts[0], parseInt(parts[1]) - 1, parts[2]).toLocaleDateString('id-ID', options);
            }
            return new Date(d).toLocaleDateString('id-ID', options);
        }

        function previewImage(src) {
            Swal.fire({
                imageUrl: src, imageAlt: 'Dokumentasi', showConfirmButton: false, width: 'auto',
                background: 'transparent', backdrop: 'rgba(15, 23, 42, 0.95)',
                customClass: { image: 'rounded-2xl max-w-[90vw] md:max-w-full max-h-[80vh] object-contain shadow-2xl border border-slate-700/50' }
            });
        }

        function applyFilters() {
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;
            const nameInput = document.getElementById('filter-name');
            const name = nameInput ? nameInput.value.toLowerCase() : '';

            let filtered = journalsData;
            if(currentUser.role === 'Guru') filtered = filtered.filter(j => j.nip_user === currentUser.nip);

            if(start) filtered = filtered.filter(j => j.tanggal >= start);
            if(end) filtered = filtered.filter(j => j.tanggal <= end);
            if(name) filtered = filtered.filter(j => j.nama_user.toLowerCase().includes(name));

            const filterState = { start: start, end: end, name: nameInput ? nameInput.value : '' };
            renderDashboard(document.getElementById('content-container'), filtered, filterState);
        }

        function resetFilters() { renderDashboard(document.getElementById('content-container')); }

        function exportToExcel() {
            if (currentFilteredJournals.length === 0) return notify('Tidak ada data untuk di-export', 'warning');
            const dataToExport = currentFilteredJournals.map((j, index) => ({
                'No': index + 1, 'Tanggal': j.tanggal, 'Nama Guru': j.nama_user, 'NIP': j.nip_user, 'Mulai Jam Ke': j.jam_mulai, 'Selesai Jam Ke': j.jam_selesai, 'Kelas/Kategori': j.kelas, 'Uraian Kegiatan': j.uraian, 'Hadir': j.jml_hadir, 'Sakit': j.abs_sakit, 'Ijin': j.abs_ijin, 'Alpha': j.abs_alpha
            }));
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data Jurnal");
            XLSX.writeFile(wb, `Export_Jurnal_SIJARI_${new Date().toISOString().split('T')[0]}.xlsx`);
            notify('Data berhasil di-export ke Excel');
        }

        function editJournalEntry(id) {
            const entry = journalsData.find(j => String(j.id) === String(id));
            if(entry) { editingJournalData = entry; renderPage('input-jurnal'); } 
            else { notify('Data jurnal tidak ditemukan.', 'error'); }
        }

        function deleteIndividualJournal(id) {
            Swal.fire({
                title: 'Hapus Jurnal?', text: "Data ini tidak dapat dikembalikan!", icon: 'warning', showCancelButton: true,
                confirmButtonColor: '#e11d48', cancelButtonColor: '#94a3b8', confirmButtonText: 'Ya, Hapus!', cancelButtonText: 'Batal',
                customClass: { confirmButton: 'rounded-xl px-6 py-2.5 font-bold shadow-md hover:bg-rose-700', cancelButton: 'rounded-xl px-6 py-2.5 font-bold hover:bg-slate-500', popup: 'rounded-3xl p-4' }
            }).then((result) => {
                if (result.isConfirmed) {
                    showLoader(true);
                    if (IS_PREVIEW) {
                        setTimeout(() => {
                            journalsData = journalsData.filter(j => String(j.id) !== String(id));
                            applyFilters(); showLoader(false); notify('Jurnal berhasil dihapus');
                        }, 1000);
                    } else {
                        deleteDoc(doc(db, "journals", String(id))).then(() => {
                            journalsData = journalsData.filter(j => String(j.id) !== String(id));
                            applyFilters(); showLoader(false); notify('Jurnal berhasil dihapus');
                        }).catch(err => {
                            showLoader(false); notify(err.message, 'error');
                        });
                    }
                }
            });
        }

                    const today = new Date();
                    const yyyy = today.getFullYear();
                    const mm = String(today.getMonth() + 1).padStart(2, '0');
                    const dd = String(today.getDate()).padStart(2, '0');
                    document.getElementById('f-tgl').value = `${yyyy}-${mm}-${dd}`;
                    handleKelasChange();
                }, 50); 
            }
        }

        function handleKelasChange() {
            const kelas = document.getElementById('f-kelas')?.value;
            const containerKehadiran = document.getElementById('container-kehadiran');
            const containerFoto = document.getElementById('container-foto');
            const fUraian = document.getElementById('f-uraian');
            
            if (kelas === 'Istirahat') {
                if (containerKehadiran) containerKehadiran.classList.add('hidden');
                if (containerFoto) containerFoto.classList.add('hidden');
                if (fUraian && fUraian.value.trim() === '') fUraian.value = 'Waktu Istirahat';
            } else if (kelas === 'Umum') {
                if (containerKehadiran) containerKehadiran.classList.add('hidden');
                if (containerFoto) containerFoto.classList.remove('hidden');
            } else {
                if (containerKehadiran) containerKehadiran.classList.remove('hidden');
                if (containerFoto) containerFoto.classList.remove('hidden');
            }
        }

        async function previewSelectedFoto(input) {
            if (input.files && input.files[0]) {
                const container = document.getElementById('foto-preview-container');
                const img = document.getElementById('f-foto-img');
                const base64 = await compressImage(input.files[0], false); 
                img.src = base64;
                container.classList.remove('hidden');
            }
        }

        async function submitJurnal() {
            const form = document.getElementById('journal-form');
            if(!form.checkValidity()) return notify('Lengkapi semua field yang wajib diisi!', 'warning');

            showLoader(true);
            const data = {
                id: editingJournalData ? editingJournalData.id : Date.now().toString(),
                tanggal: document.getElementById('f-tgl').value,
                kelas: document.getElementById('f-kelas').value,
                jam_mulai: document.getElementById('f-jam-mulai').value,
                jam_selesai: document.getElementById('f-jam-selesai').value,
                uraian: document.getElementById('f-uraian').value,
                nip_user: editingJournalData ? editingJournalData.nip_user : currentUser.nip,
                nama_user: editingJournalData ? editingJournalData.nama_user : currentUser.nama,
                foto: document.getElementById('f-foto-img')?.src || ''
            };

            if(currentUser.role === 'Guru' && data.kelas !== 'Istirahat' && data.kelas !== 'Umum') {
                data.jml_hadir = document.getElementById('f-hadir').value;
                data.abs_sakit = document.getElementById('f-sakit').value;
                data.abs_ijin = document.getElementById('f-ijin').value;
                data.abs_alpha = document.getElementById('f-alpha').value;
            } else {
                data.jml_hadir = 0; data.abs_sakit = 0; data.abs_ijin = 0; data.abs_alpha = 0;
            }

            if(IS_PREVIEW) {
                setTimeout(() => {
                    if (editingJournalData) {
                        const index = journalsData.findIndex(j => String(j.id) === String(data.id));
                        if(index !== -1) journalsData[index] = data;
                        notify('Jurnal berhasil diperbarui!');
                    } else {
                        journalsData.unshift(data);
                        notify('Jurnal berhasil disimpan!');
                    }
                    showLoader(false);
                    editingJournalData = null; 
                    renderPage('dashboard');
                }, 1000);
            } else {
                try {
                    await setDoc(doc(db, "journals", data.id), data);
                    if (editingJournalData) {
                        const index = journalsData.findIndex(j => String(j.id) === String(data.id));
                        if(index !== -1) journalsData[index] = data;
                    } else {
                        journalsData.unshift(data);
                    }
                    showLoader(false);
                    notify(editingJournalData ? 'Jurnal diperbarui!' : 'Jurnal disimpan!');
                    editingJournalData = null; 
                    renderPage('dashboard');
                } catch(e) {
                    showLoader(false);
                    notify(e.message, 'error');
                }
            }
        }

        function printReport(dataToPrint, filterNipGuru = null) {
            if (!dataToPrint || dataToPrint.length === 0) return notify('Tidak ada data untuk dicetak pada filter tersebut', 'warning');
            const kepsek = { nama: 'Ni Kadek Yadnyani, S.Pd', nip: '197910162006042006' };
            let guruInfoNama = currentUser.nama, guruInfoNip = currentUser.nip, isKepsekFormat = false;

                const targetUser = usersData.find(u => String(u.nip) === String(filterNipGuru));

                    const targetUser = usersData.find(u => u.nip === uniqueGurus[0]);

            });

            let tableHeader = isKepsekFormat ? `<tr><th style="width: 5%; text-align: center !important;">No</th><th style="width: 18%; text-align: center !important;">Hari/Tanggal</th><th style="width: 8%; text-align: center !important;">Jam Ke</th><th style="text-align: center !important;">Uraian Kegiatan</th><th style="width: 25%; text-align: center !important;">Dokumentasi</th></tr>` : `<tr><th rowspan="2" style="width: 4%; text-align: center !important;">No</th><th rowspan="2" style="width: 13%; text-align: center !important;">Hari /<br>Tanggal</th><th rowspan="2" style="width: 6%; text-align: center !important;">Jam Ke</th><th rowspan="2" style="width: 8%; text-align: center !important;">Kelas</th><th rowspan="2" style="text-align: center !important;">Uraian Kegiatan / Pokok Bahasan</th><th colspan="4" style="width: 16%; text-align: center !important;">Kehadiran Siswa</th><th rowspan="2" style="width: 18%; text-align: center !important;">Dokumentasi</th></tr><tr><th style="background-color: #86efac; width: 4%; text-align: center !important;">H</th><th style="background-color: #fde047; width: 4%; text-align: center !important;">S</th><th style="background-color: #93c5fd; width: 4%; text-align: center !important;">I</th><th style="background-color: #fca5a5; width: 4%; text-align: center !important;">A</th></tr>`;

            let tableRows = "", processedDates = {}, dateCounter = 0; 
            sortedData.forEach((j, index) => {
                const isIstirahat = j.kelas === 'Istirahat', isUmum = j.kelas === 'Umum';
                const dateDisplay = new Date(j.tanggal).toLocaleDateString('id-ID', { weekday: 'long' }) + ",<br>" + new Date(j.tanggal).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

                if (isKepsekFormat) {

            reader.onload = async (e) => {
                const rows = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]]);
                const newUsers = rows.map(r => ({ nip: String(r.NIP || r.nip || '').trim(), nama: String(r.Nama || r.nama || '').trim(), password: String(r.Password || r.password || '123456').trim(), mapel: String(r.Mapel || r.mapel || '-').trim(), role: String(r.Role || r.role || 'Guru').trim(), foto: String(r.Foto || r.foto || '').trim() })).filter(u => u.nip && u.nama);

                if(newUsers.length > 0) {
                    showLoader(true);
                    if (IS_PREVIEW) { setTimeout(() => { usersData = [...usersData, ...newUsers]; showLoader(false); renderPage('manage-users'); notify(`${newUsers.length} user ditambahkan`); }, 1000); } 
                    else {
                        try {
                            const batch = writeBatch(db);
                            newUsers.forEach(u => batch.set(doc(db, "users", u.nip), u));
                            await batch.commit();
                            
                            newUsers.forEach(nu => {
                                const exist = usersData.findIndex(u => u.nip === nu.nip);
                                if(exist !== -1) usersData[exist] = nu; else usersData.push(nu);
                            });
                            showLoader(false); renderPage('manage-users'); notify(`${newUsers.length} user ditambahkan`);
                        } catch(err) {
                            showLoader(false); notify(err.message, 'error');
                        }
                    }
                } else { notify('Tidak ada data valid yang ditemukan.', 'warning'); }
            }; reader.readAsArrayBuffer(file); input.value = ''; 
        }

        function deleteUser(nip) {
            Swal.fire({
                title: 'Hapus User?', text: "Data tidak bisa dikembalikan!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#e11d48', confirmButtonText: 'Ya, Hapus!', cancelButtonText: 'Batal',
                customClass: { confirmButton: 'rounded-xl px-6 py-3 font-bold shadow-md hover:bg-rose-700 w-full sm:w-auto', cancelButton: 'rounded-xl px-6 py-3 font-bold hover:bg-slate-500 w-full sm:w-auto mt-2 sm:mt-0', popup: 'rounded-[2rem] p-4 md:p-6', actions: 'flex-col sm:flex-row w-full' }
            }).then((result) => {
                if (result.isConfirmed) {
                    showLoader(true);
                    if (IS_PREVIEW) { setTimeout(() => { usersData = usersData.filter(u => String(u.nip) !== String(nip)); showLoader(false); notify('User berhasil dihapus'); renderPage('manage-users'); }, 1000); } 
                    else {
                        deleteDoc(doc(db, "users", String(nip))).then(() => {
                            usersData = usersData.filter(u => String(u.nip) !== String(nip));
                            showLoader(false); notify('User berhasil dihapus'); renderPage('manage-users');
                        }).catch(e => {
                            showLoader(false); notify(e.message, 'error');
                        });
                    }
                }
            });
        }

        function handleDeleteAllUsers() {
            Swal.fire({
                title: 'Hapus SEMUA User?', text: "Semua user KECUALI akun Anda akan dihapus!", icon: 'error', showCancelButton: true, confirmButtonColor: '#e11d48', confirmButtonText: 'Ya, Hapus Semua!', cancelButtonText: 'Batal',
                customClass: { confirmButton: 'rounded-xl px-6 py-3 font-bold shadow-md hover:bg-rose-700 w-full sm:w-auto', cancelButton: 'rounded-xl px-6 py-3 font-bold hover:bg-slate-500 w-full sm:w-auto mt-2 sm:mt-0', popup: 'rounded-[2rem] p-4 md:p-6', actions: 'flex-col sm:flex-row w-full' }
            }).then((result) => {
                if (result.isConfirmed) {
                    showLoader(true);
                    if (IS_PREVIEW) { setTimeout(() => { usersData = usersData.filter(u => String(u.nip) === String(currentUser.nip)); showLoader(false); notify('Semua user lain dihapus'); renderPage('manage-users'); }, 1000); } 
                    else {
                        try {
                            const batch = writeBatch(db);
                            const toDelete = usersData.filter(u => String(u.nip) !== String(currentUser.nip));
                            toDelete.forEach(u => batch.delete(doc(db, "users", String(u.nip))));
                            batch.commit().then(() => {
                                usersData = usersData.filter(u => String(u.nip) === String(currentUser.nip));
                                showLoader(false); notify('Semua user lain dihapus'); renderPage('manage-users');
                            });
                        } catch(e) {
                            showLoader(false); notify(e.message, 'error');
                        }
                    }
                }
            });
        }

        // BIND FUNCTIONS TO WINDOW OBJECT FOR HTML ONCLICK EVENT SUPPORT IN A MODULE
        window.handleLogin = handleLogin;
        window.handleLogout = handleLogout;
        window.resetAndGoToInput = resetAndGoToInput;
        window.renderPage = renderPage;
        window.applyFilters = applyFilters;
        window.resetFilters = resetFilters;
        window.exportToExcel = exportToExcel;
        window.editJournalEntry = editJournalEntry;
        window.deleteIndividualJournal = deleteIndividualJournal;
        window.previewImage = previewImage;
        window.handleKelasChange = handleKelasChange;
        window.previewSelectedFoto = previewSelectedFoto;
        window.submitJurnal = submitJurnal;
        window.showUserForm = showUserForm;
        window.previewSwalFoto = previewSwalFoto;
        window.updateProfile = updateProfile;
        window.previewProfilePhoto = previewProfilePhoto;
        window.handlePrintDialog = handlePrintDialog;
        window.handleBulkDelete = handleBulkDelete;
        window.downloadUserTemplate = downloadUserTemplate;
        window.handleExcelUpload = handleExcelUpload;
        window.deleteUser = deleteUser;
        window.handleDeleteAllUsers = handleDeleteAllUsers;

    </script>
    
</body>
